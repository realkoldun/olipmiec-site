services:
  # Ollama LLM Server
  ollama:
    image: ollama/ollama:latest
    container_name: olimpiyec_ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - olimpiyec_network
    healthcheck:
      test: ["CMD-SHELL", "ollama list > /dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    environment:
      - OLLAMA_KEEP_ALIVE=-1  # Держать модель в памяти постоянно
    runtime: nvidia

  # Init: загрузка модели при первом запуске
  ollama-init:
    image: ollama/ollama:latest
    container_name: olimpiyec_ollama_init
    restart: "no"
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      OLLAMA_HOST: ollama:11434
    volumes:
      - ./init-ollama.sh:/init-ollama.sh:ro
    entrypoint: ["/bin/sh", "/init-ollama.sh"]
    networks:
      - olimpiyec_network

  # Backend API
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: olimpiyec_backend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: "3000"
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USERNAME: root
      DB_PASSWORD: password
      DB_NAME: root
      TELEGRAM_CHANNEL_ID: olimpiets2013
      OLLAMA_BASE_URL: http://ollama:11434
      OLLAMA_MODEL: gemma3:4b
      FRONTEND_URL: http://localhost:3001
      BASE_URL: http://localhost:3000
    volumes:
      - backend_uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_healthy
    networks:
      - olimpiyec_network
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:3000/api/ai/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: olimpiyec_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: password
      POSTGRES_DB: root
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - olimpiyec_network
    depends_on:
      ollama:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U root"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  olimpiyec_network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
  ollama_data:
    driver: local
  backend_uploads:
    driver: local
